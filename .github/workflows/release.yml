name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"

          build() {
            local goos="$1" goarch="$2"
            local binname="goloop"
            if [ "$goos" = "windows" ]; then
              binname="goloop.exe"
            fi

            # Stage the binary under its canonical name so the archive always
            # contains "goloop" (or "goloop.exe"), regardless of OS/arch.
            local stage="dist/stage"
            rm -rf "$stage"
            mkdir -p "$stage"

            local base="goloop-${goos}-${goarch}"
            echo "Building ${goos}/${goarch} -> ${base} (archive contains ${binname})"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -ldflags "$LDFLAGS" \
              -o "${stage}/${binname}" \
              ./cmd/goloop

            if [ "$goos" = "windows" ]; then
              (cd "$stage" && zip -q "../${base}.zip" "$binname")
            else
              tar -C "$stage" -czf "dist/${base}.tar.gz" "$binname"
            fi
            rm -rf "$stage"
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum goloop-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/goloop-*
            dist/checksums.txt
