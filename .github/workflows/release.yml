name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X main.version=${VERSION}"

          build() {
            local goos="$1" goarch="$2"
            local out="dist/goloop-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              out="${out}.exe"
            fi
            echo "Building ${goos}/${goarch} -> ${out}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -ldflags "$LDFLAGS" \
              -o "$out" \
              ./cmd/goloop

            local archive="dist/goloop-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              (cd dist && zip -q "$(basename "${archive}.zip")" "$(basename "$out")")
              rm "$out"
            else
              tar -C dist -czf "${archive}.tar.gz" "$(basename "$out")"
              rm "$out"
            fi
          }

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64
          build windows amd64

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum goloop-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/goloop-*
            dist/checksums.txt
