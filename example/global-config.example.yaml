# Copy to ~/.goloop/config.yaml (or run: goloop configure)
# Sets defaults for every project — no objective here.

supervisor:
  backend: chatgpt
  model: gpt-4.1
  temperature: 0.3

worker:
  backend: cursor
  builder_agent: builder
  evaluator_agent: evaluator
  toolsmith_agent: toolsmith
  timeout_seconds: 1800
  show_reasoning: true

cursor:
  binary: cursor
  model: composer-2.5-fast

# claude_code:
#   binary: claude
#   model: claude-sonnet-4-6

tools:
  restart_exit_code: 75

loop:
  max_iterations: 50
  pause_seconds: 2
  interactive: true
  audit_completion: true   # verify `complete` claims with a read-only evaluator pass
  notifications: true      # desktop notification on ask_user / completion
